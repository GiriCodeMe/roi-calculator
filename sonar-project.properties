# ── Project identity ─────────────────────────────────────────────────────────
# Replace these two values with your SonarCloud organisation and project key.
# Organisation key: https://sonarcloud.io/account/organizations
# Project key:      must be unique within the organisation (no spaces)
sonar.organization=YOUR_SONARCLOUD_ORG
sonar.projectKey=YOUR_SONARCLOUD_ORG_roi-calculator

sonar.projectName=ROI Calculator
sonar.projectVersion=1.0.0

# ── Sources ───────────────────────────────────────────────────────────────────
sonar.sources=src
sonar.exclusions=src/test/**,src/main.jsx

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=src/test
sonar.test.inclusions=src/test/**/*.{js,jsx}

# ── Coverage (LCOV generated by vitest --coverage) ────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/test/**,src/main.jsx

# ── Language ──────────────────────────────────────────────────────────────────
sonar.language=js
sonar.sourceEncoding=UTF-8

# ── Quality Gate ──────────────────────────────────────────────────────────────
# The pipeline uses sonarqube-quality-gate-action to enforce the gate result.
# Configure gate rules in SonarCloud UI: Administration → Quality Gates
# Recommended: fail on any NEW vulnerability of any severity.
