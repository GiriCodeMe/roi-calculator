name: CI — Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Build & Quality Gates
    runs-on: ubuntu-latest

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # SonarQube needs full history for blame info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── Gate 1: Build ────────────────────────────────────────────────────────
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      # ── Gate 2: Package (npm pack) ───────────────────────────────────────────
      - name: Package (npm pack)
        id: package
        continue-on-error: true
        run: |
          PACK_FILE=$(npm pack --dry-run 2>&1 | grep "^npm notice filename" | awk '{print $NF}')
          npm pack
          echo "pack_file=$PACK_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload npm package artifact
        if: steps.package.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: ignore

      # ── Gate 3: Unit Tests ───────────────────────────────────────────────────
      - name: Unit Tests
        id: unit-tests
        continue-on-error: true
        run: npm test

      # ── Gate 4: Code Coverage (≥95% required) ────────────────────────────────
      - name: Code Coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      # ── Gate 5: Code Lint ────────────────────────────────────────────────────
      - name: Code Lint (ESLint)
        id: lint
        continue-on-error: true
        run: npm run lint

      # ── Gate 6: Library Audit (all severities reported) ──────────────────────
      - name: Library Audit
        id: lib-audit
        continue-on-error: true
        run: npm audit

      # ── Gate 7: npm audit Vulnerability Check (moderate+ = fail) ─────────────
      - name: Vulnerability Check — npm audit (fail on >low)
        id: vuln-check
        continue-on-error: true
        run: npm audit --audit-level=moderate

      # ── Gate 8 & 9: SonarQube (disabled — enable when secrets are configured) ──
      # To enable:
      #   1. Add SONAR_TOKEN and SONAR_HOST_URL to GitHub repository secrets
      #   2. Update sonar-project.properties with your organisation and project key
      #   3. Uncomment the two steps below and remove the skipped placeholders
      #
      # - name: SonarQube Scan
      #   id: sonar-scan
      #   continue-on-error: true
      #   uses: SonarSource/sonarqube-scan-action@v5
      #   env:
      #     SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      #
      # - name: SonarQube Quality Gate
      #   id: sonar-gate
      #   continue-on-error: true
      #   uses: SonarSource/sonarqube-quality-gate-action@v1
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan (disabled)
        id: sonar-scan
        run: echo "SonarQube scan is disabled — skipping"

      - name: SonarQube Quality Gate (disabled)
        id: sonar-gate
        run: echo "SonarQube quality gate is disabled — skipping"

      # ── Report: Go / No-Go Dashboard ─────────────────────────────────────────
      - name: Generate Go/No-Go Report
        if: always()
        env:
          BUILD:       ${{ steps.build.outcome }}
          PACKAGE:     ${{ steps.package.outcome }}
          TESTS:       ${{ steps.unit-tests.outcome }}
          COVERAGE:    ${{ steps.coverage.outcome }}
          LINT:        ${{ steps.lint.outcome }}
          LIB_AUDIT:   ${{ steps.lib-audit.outcome }}
          VULN_CHECK:  ${{ steps.vuln-check.outcome }}
          SONAR_SCAN:  ${{ steps.sonar-scan.outcome }}
          SONAR_GATE:  ${{ steps.sonar-gate.outcome }}
        run: |
          icon() { [ "$1" = "success" ] && echo "✅ Pass" || echo "❌ Fail"; }

          PASS=true
          for s in "$BUILD" "$PACKAGE" "$TESTS" "$COVERAGE" "$LINT" "$LIB_AUDIT" "$VULN_CHECK" "$SONAR_SCAN" "$SONAR_GATE"; do
            [ "$s" != "success" ] && PASS=false
          done

          if [ "$PASS" = true ]; then
            CONCLUSION="✅ **Go**"
            CONCLUSION_TEXT="All quality gates passed. Safe to deploy."
          else
            CONCLUSION="❌ **No-Go**"
            CONCLUSION_TEXT="One or more quality gates failed. Do not deploy."
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 📊 Build Quality Report

          | Gate | Check | Status | Threshold |
          |------|-------|--------|-----------|
          | 1 | Build | $(icon $BUILD) | Must compile without errors |
          | 2 | Package (npm pack) | $(icon $PACKAGE) | Package created successfully |
          | 3 | Unit Tests | $(icon $TESTS) | 0 test failures |
          | 4 | Code Coverage | $(icon $COVERAGE) | ≥ 95% (statements, functions, branches, lines) |
          | 5 | Code Lint | $(icon $LINT) | 0 ESLint errors |
          | 6 | Library Audit | $(icon $LIB_AUDIT) | All advisories reported |
          | 7 | Vulnerability Check (npm audit) | $(icon $VULN_CHECK) | No moderate / high / critical vulnerabilities |
          | 8 | SonarQube Scan | $(icon $SONAR_SCAN) | Analysis uploaded successfully |
          | 9 | SonarQube Quality Gate | $(icon $SONAR_GATE) | Quality gate must pass |

          ---

          ## Conclusion: $CONCLUSION

          > $CONCLUSION_TEXT
          EOF

      # ── Enforce: fail the job if any gate failed ──────────────────────────────
      - name: Enforce Gates
        if: always()
        env:
          BUILD:       ${{ steps.build.outcome }}
          PACKAGE:     ${{ steps.package.outcome }}
          TESTS:       ${{ steps.unit-tests.outcome }}
          COVERAGE:    ${{ steps.coverage.outcome }}
          LINT:        ${{ steps.lint.outcome }}
          LIB_AUDIT:   ${{ steps.lib-audit.outcome }}
          VULN_CHECK:  ${{ steps.vuln-check.outcome }}
          SONAR_SCAN:  ${{ steps.sonar-scan.outcome }}
          SONAR_GATE:  ${{ steps.sonar-gate.outcome }}
        run: |
          FAILED=""
          [ "$BUILD"      != "success" ] && FAILED="$FAILED\n  ❌ Build"
          [ "$PACKAGE"    != "success" ] && FAILED="$FAILED\n  ❌ Package (npm pack)"
          [ "$TESTS"      != "success" ] && FAILED="$FAILED\n  ❌ Unit Tests"
          [ "$COVERAGE"   != "success" ] && FAILED="$FAILED\n  ❌ Code Coverage (<95%)"
          [ "$LINT"       != "success" ] && FAILED="$FAILED\n  ❌ Code Lint"
          [ "$LIB_AUDIT"  != "success" ] && FAILED="$FAILED\n  ❌ Library Audit"
          [ "$VULN_CHECK" != "success" ] && FAILED="$FAILED\n  ❌ Vulnerability Check (moderate+ found)"
          [ "$SONAR_SCAN" != "success" ] && FAILED="$FAILED\n  ❌ SonarQube Scan"
          [ "$SONAR_GATE" != "success" ] && FAILED="$FAILED\n  ❌ SonarQube Quality Gate"

          if [ -n "$FAILED" ]; then
            echo "::error::No-Go — the following gates failed:$(printf "$FAILED")"
            exit 1
          fi

          echo "All quality gates passed — Go ✅"
