name: CI — Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Build & Quality Gates
    runs-on: ubuntu-latest

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # SonarQube needs full history for blame info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── Gate 1: Build ────────────────────────────────────────────────────────
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      # ── Gate 2: Package (npm pack) ───────────────────────────────────────────
      - name: Package (npm pack)
        id: package
        continue-on-error: true
        run: |
          PACK_FILE=$(npm pack --dry-run 2>&1 | grep "^npm notice filename" | awk '{print $NF}')
          npm pack
          echo "pack_file=$PACK_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload npm package artifact
        if: steps.package.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: ignore

      # ── Gate 3: Lighthouse Performance & Quality ─────────────────────────────
      - name: Lighthouse CI
        id: lighthouse
        continue-on-error: true
        run: |
          npm run test:lighthouse 2>&1 | tee /tmp/lighthouse-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: ignore

      # ── Gate 4: E2E Behavioural Tests + Coverage ─────────────────────────────
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build with Coverage Instrumentation
        run: npm run build:coverage

      - name: E2E Tests (Playwright)
        id: e2e-tests
        continue-on-error: true
        run: |
          npm run test:e2e:coverage 2>&1 | tee /tmp/e2e-output.txt
          exit ${PIPESTATUS[0]}

      - name: Generate E2E Coverage Report
        if: always()
        run: npm run report:e2e:coverage

      - name: E2E Coverage Threshold (>79%)
        id: e2e-coverage
        continue-on-error: true
        run: npm run check:e2e:coverage

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload E2E Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage-e2e/
          if-no-files-found: ignore

      # ── Gate 6: Accessibility — WCAG 2.1 AA (axe-core) ───────────────────────
      - name: Accessibility Tests (WCAG 2.1 AA)
        id: a11y
        continue-on-error: true
        run: |
          npm run test:a11y 2>&1 | tee /tmp/a11y-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Accessibility Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: playwright-report/
          if-no-files-found: ignore

      # ── Gate 7: Unit Tests + Coverage (≥95% required) ───────────────────────
      - name: Unit Tests & Coverage
        id: unit-tests
        continue-on-error: true
        run: |
          npm run test:coverage 2>&1 | tee /tmp/unit-test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      # ── Gate 8: Code Lint ────────────────────────────────────────────────────
      - name: Code Lint (ESLint)
        id: lint
        continue-on-error: true
        run: npm run lint

      # ── Gate 9: Library Audit (all severities reported) ──────────────────────
      - name: Library Audit
        id: lib-audit
        continue-on-error: true
        run: npm audit

      # ── Gate 10: npm audit Vulnerability Check (moderate+ = fail) ───────────
      - name: Vulnerability Check — npm audit (fail on >low)
        id: vuln-check
        continue-on-error: true
        run: npm audit --audit-level=moderate

      # ── Gate 11 & 12: SonarQube (disabled — enable when secrets are configured) ─
      # To enable:
      #   1. Add SONAR_TOKEN and SONAR_HOST_URL to GitHub repository secrets
      #   2. Update sonar-project.properties with your organisation and project key
      #   3. Uncomment the two steps below and remove the skipped placeholders
      #
      # - name: SonarQube Scan
      #   id: sonar-scan
      #   continue-on-error: true
      #   uses: SonarSource/sonarqube-scan-action@v5
      #   env:
      #     SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      #
      # - name: SonarQube Quality Gate
      #   id: sonar-gate
      #   continue-on-error: true
      #   uses: SonarSource/sonarqube-quality-gate-action@v1
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan (disabled)
        id: sonar-scan
        run: echo "SonarQube scan is disabled — skipping"

      - name: SonarQube Quality Gate (disabled)
        id: sonar-gate
        run: echo "SonarQube quality gate is disabled — skipping"

      # ── Report: Go / No-Go Dashboard ─────────────────────────────────────────
      - name: Generate Go/No-Go Report
        if: always()
        env:
          BUILD:         ${{ steps.build.outcome }}
          PACKAGE:       ${{ steps.package.outcome }}
          LIGHTHOUSE:    ${{ steps.lighthouse.outcome }}
          E2E:           ${{ steps.e2e-tests.outcome }}
          E2E_COVERAGE:  ${{ steps.e2e-coverage.outcome }}
          A11Y:          ${{ steps.a11y.outcome }}
          TESTS:         ${{ steps.unit-tests.outcome }}
          LINT:          ${{ steps.lint.outcome }}
          LIB_AUDIT:     ${{ steps.lib-audit.outcome }}
          VULN_CHECK:    ${{ steps.vuln-check.outcome }}
          SONAR_SCAN:    ${{ steps.sonar-scan.outcome }}
          SONAR_GATE:    ${{ steps.sonar-gate.outcome }}
        run: |
          icon()      { [ "$1" = "success" ] && echo "✅ Pass" || echo "❌ Fail"; }
          strip_ansi() { sed 's/\x1B\[[0-9;]*[mGKHF]//g' "$1" 2>/dev/null || echo "Output not available"; }

          PASS=true
          for s in "$BUILD" "$PACKAGE" "$LIGHTHOUSE" "$E2E" "$E2E_COVERAGE" "$A11Y" "$TESTS" "$LINT" "$LIB_AUDIT" "$VULN_CHECK" "$SONAR_SCAN" "$SONAR_GATE"; do
            [ "$s" != "success" ] && PASS=false
          done

          if [ "$PASS" = true ]; then
            CONCLUSION="✅ **Go**"
            CONCLUSION_TEXT="All quality gates passed. Safe to deploy."
          else
            CONCLUSION="❌ **No-Go**"
            CONCLUSION_TEXT="One or more quality gates failed. Do not deploy."
          fi

          # Extract one-line summaries for collapsible headers
          UNIT_SUMMARY=$(grep -E "^ *Tests " /tmp/unit-test-output.txt 2>/dev/null | tail -1 \
            | sed 's/^ *//' | sed 's/\x1B\[[0-9;]*[mGKHF]//g' || echo "unavailable")
          E2E_SUMMARY=$(grep -E "[0-9]+ (passed|failed)" /tmp/e2e-output.txt 2>/dev/null | tail -1 \
            | sed 's/^ *//' | sed 's/\x1B\[[0-9;]*[mGKHF]//g' || echo "unavailable")
          A11Y_SUMMARY=$(grep -E "[0-9]+ (passed|failed)" /tmp/a11y-output.txt 2>/dev/null | tail -1 \
            | sed 's/^ *//' | sed 's/\x1B\[[0-9;]*[mGKHF]//g' || echo "unavailable")

          # ── Main gate table ───────────────────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 📊 Build Quality Report

          | Gate | Check | Status | Threshold |
          |------|-------|--------|-----------|
          | 1  | Build | $(icon $BUILD) | Must compile without errors |
          | 2  | Package (npm pack) | $(icon $PACKAGE) | Package created successfully |
          | 3  | Lighthouse (Perf / A11y / BP) | $(icon $LIGHTHOUSE) | Performance ≥ 80, Accessibility ≥ 90, Best Practices ≥ 80 |
          | 4  | E2E Tests (Playwright) | $(icon $E2E) | All behavioural tests pass |
          | 5  | E2E Coverage | $(icon $E2E_COVERAGE) | > 79% (statements, functions, branches, lines) |
          | 6  | Accessibility — WCAG 2.1 AA | $(icon $A11Y) | 0 axe-core violations |
          | 7  | Unit Tests & Coverage | $(icon $TESTS) | 0 failures + ≥ 95% (statements, functions, branches, lines) |
          | 8  | Code Lint | $(icon $LINT) | 0 ESLint errors |
          | 9  | Library Audit | $(icon $LIB_AUDIT) | All advisories reported |
          | 10 | Vulnerability Check (npm audit) | $(icon $VULN_CHECK) | No moderate / high / critical vulnerabilities |
          | 11 | SonarQube Scan | $(icon $SONAR_SCAN) | Analysis uploaded successfully |
          | 12 | SonarQube Quality Gate | $(icon $SONAR_GATE) | Quality gate must pass |

          EOF

          # ── Collapsible: Lighthouse Results ───────────────────────────────────
          {
            echo "<details>"
            echo "<summary>🔦 Lighthouse Results (Performance / Accessibility / Best Practices)</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/lighthouse-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Collapsible: Unit Test Results ────────────────────────────────────
          {
            echo "<details>"
            echo "<summary>🧪 Unit Test Results — ${UNIT_SUMMARY}</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/unit-test-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Collapsible: E2E Test Results ─────────────────────────────────────
          {
            echo "<details>"
            echo "<summary>🎭 E2E Test Results (Playwright) — ${E2E_SUMMARY}</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/e2e-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Collapsible: Accessibility Test Results ───────────────────────────
          {
            echo "<details>"
            echo "<summary>♿ Accessibility Test Results (WCAG 2.1 AA) — ${A11Y_SUMMARY}</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/a11y-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Conclusion ────────────────────────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ---

          ## Conclusion: $CONCLUSION

          > $CONCLUSION_TEXT
          EOF

      # ── Enforce: fail the job if any gate failed ──────────────────────────────
      - name: Enforce Gates
        if: always()
        env:
          BUILD:         ${{ steps.build.outcome }}
          PACKAGE:       ${{ steps.package.outcome }}
          LIGHTHOUSE:    ${{ steps.lighthouse.outcome }}
          E2E:           ${{ steps.e2e-tests.outcome }}
          E2E_COVERAGE:  ${{ steps.e2e-coverage.outcome }}
          A11Y:          ${{ steps.a11y.outcome }}
          TESTS:         ${{ steps.unit-tests.outcome }}
          LINT:          ${{ steps.lint.outcome }}
          LIB_AUDIT:     ${{ steps.lib-audit.outcome }}
          VULN_CHECK:    ${{ steps.vuln-check.outcome }}
          SONAR_SCAN:    ${{ steps.sonar-scan.outcome }}
          SONAR_GATE:    ${{ steps.sonar-gate.outcome }}
        run: |
          FAILED=""
          [ "$BUILD"         != "success" ] && FAILED="$FAILED\n  ❌ Build"
          [ "$PACKAGE"       != "success" ] && FAILED="$FAILED\n  ❌ Package (npm pack)"
          [ "$LIGHTHOUSE"    != "success" ] && FAILED="$FAILED\n  ❌ Lighthouse (Perf / A11y / Best Practices)"
          [ "$E2E"           != "success" ] && FAILED="$FAILED\n  ❌ E2E Tests (Playwright)"
          [ "$E2E_COVERAGE"  != "success" ] && FAILED="$FAILED\n  ❌ E2E Coverage (<79%)"
          [ "$A11Y"          != "success" ] && FAILED="$FAILED\n  ❌ Accessibility — WCAG 2.1 AA"
          [ "$TESTS"         != "success" ] && FAILED="$FAILED\n  ❌ Unit Tests & Coverage (<95%)"
          [ "$LINT"          != "success" ] && FAILED="$FAILED\n  ❌ Code Lint"
          [ "$LIB_AUDIT"     != "success" ] && FAILED="$FAILED\n  ❌ Library Audit"
          [ "$VULN_CHECK"    != "success" ] && FAILED="$FAILED\n  ❌ Vulnerability Check (moderate+ found)"
          [ "$SONAR_SCAN"    != "success" ] && FAILED="$FAILED\n  ❌ SonarQube Scan (Gate 11)"
          [ "$SONAR_GATE"    != "success" ] && FAILED="$FAILED\n  ❌ SonarQube Quality Gate (Gate 12)"

          if [ -n "$FAILED" ]; then
            echo "::error::No-Go — the following gates failed:$(printf "$FAILED")"
            exit 1
          fi

          echo "All quality gates passed — Go ✅"
